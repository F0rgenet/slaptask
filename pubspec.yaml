version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  http: ^1.2.1
  record: ^6.2.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
