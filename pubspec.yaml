version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  http: ^1.2.1
  record: ^6.2.0
  path_provider: ^2.1.2
  permission_handler: ^12.0.1
  workmanager: ^0.9.0
  flutter_local_notifications: ^20.1.0
  intl: ^0.20.2
  google_fonts: ^8.0.2
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env