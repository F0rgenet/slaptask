publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: 3.41.2

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  http: ^1.2.1
  record: ^6.2.0
  path_provider: ^2.1.2
  permission_handler: ^12.0.1
  workmanager: ^0.9.0
  flutter_local_notifications: ^20.1.0
  intl: ^0.20.2
  google_fonts: ^8.0.2
  flutter_dotenv: ^6.0.0
  logger: ^2.6.2
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  freezed: ^3.2.5

flutter:
  uses-material-design: true
  assets:
    - .env